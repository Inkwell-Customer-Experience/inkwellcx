<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>InkwellCX — Websites That Convert</title>
    <meta name="description" content="InkwellCX builds and manages high-converting websites for ambitious businesses. Design, hosting, SEO, analytics, and ongoing optimisation — all in one place." />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;600;700;800&display=swap" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;600;700;800&display=swap" />
    <link rel="preload" as="image" href="/logo-dark.svg" fetchpriority="high" />
    <link rel="preload" as="image" href="/logo-light.svg" fetchpriority="high" />
    <style>
      /* Critical above-the-fold CSS — prevents blank flash while bundle loads */
      *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
      :root{--bg:#0D1117;--surface:#111820;--border:#21262D;--text:#E6EDF3;--muted:#7D8590;--accent:#1F6FEB;--navbar-bg:rgba(13,17,23,0.92);--radius:6px;--green:#3FB950;--font-mono:'Space Mono','SpaceMono-fallback',monospace;--font-sans:'Syne','Syne-fallback',sans-serif}
      [data-theme="light"]{--bg:#F6F8FA;--surface:#FFFFFF;--border:#D0D7DE;--text:#1F2328;--navbar-bg:rgba(246,248,250,0.92)}
      html{scroll-behavior:smooth}
      body{font-family:var(--font-sans);background:var(--bg);color:var(--text);line-height:1.6;overflow-x:hidden;-webkit-font-smoothing:antialiased}
      .page-wrapper{max-width:1280px;margin:0 auto;border-left:.5px solid var(--border);border-right:.5px solid var(--border);min-height:100vh;position:relative;z-index:1;overflow-x:hidden}
      .navbar{position:sticky;top:0;z-index:1000;background:var(--navbar-bg);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--border)}
      .navbar-inner{display:flex;align-items:center;justify-content:space-between;height:64px}
      .container{max-width:1160px;margin:0 auto;padding:0 32px}
      .hero-headline{font-size:48px;line-height:1.2;font-weight:700;color:var(--text)}
      .body-copy{font-size:16px;color:var(--text);line-height:1.6}
      .status-badge{display:inline-flex;align-items:center;gap:8px;padding:8px 12px;background:rgba(63,185,80,0.1);border:1px solid var(--green);border-radius:4px;font-size:12px;color:var(--green)}
      .pulse-dot{width:8px;height:8px;background:var(--green);border-radius:50%;animation:pulse 2s infinite}
      @keyframes pulse{0%{opacity:1}50%{opacity:.5}100%{opacity:1}}
    </style>
    <style>
      /* Inlined here so fallback metrics are available before any external stylesheet
         loads — eliminates the metric-shift when web fonts swap in (CLS fix). */
      @font-face {
        font-family: 'Syne-fallback';
        src: local('Arial');
        size-adjust: 96%;
        ascent-override: 91%;
        descent-override: 22%;
        line-gap-override: 0%;
      }
      @font-face {
        font-family: 'SpaceMono-fallback';
        src: local('Courier New');
        size-adjust: 108%;
        ascent-override: 86%;
        descent-override: 22%;
        line-gap-override: 0%;
      }
    </style>
  </head>
  <body>
    <!-- Blocking theme script: applies stored theme before React mounts to prevent FOUC/CLS -->
    <script>
      (function(){
        try {
          var t = localStorage.getItem('theme');
          if (t === 'light') {
            document.documentElement.setAttribute('data-theme', 'light');
          } else {
            document.documentElement.removeAttribute('data-theme');
          }
        } catch(e){}
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
