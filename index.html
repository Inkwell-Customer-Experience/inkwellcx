<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>InkwellCX — Websites That Convert</title>
    <meta name="description" content="InkwellCX builds and manages high-converting websites for ambitious businesses. Design, hosting, SEO, analytics, and ongoing optimisation — all in one place." />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;600;700;800&display=fallback" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;600;700;800&display=fallback" media="print" onload="this.media='all'" />
    <noscript>
      <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;600;700;800&display=fallback" />
    </noscript>
    <style>
      /* Inlined here so fallback metrics are available before any external stylesheet
         loads — eliminates the metric-shift when web fonts swap in (CLS fix). */
      @font-face {
        font-family: 'Syne-fallback';
        src: local('Arial');
        size-adjust: 96%;
        ascent-override: 91%;
        descent-override: 22%;
        line-gap-override: 0%;
      }
      @font-face {
        font-family: 'SpaceMono-fallback';
        src: local('Courier New');
        size-adjust: 108%;
        ascent-override: 86%;
        descent-override: 22%;
        line-gap-override: 0%;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
