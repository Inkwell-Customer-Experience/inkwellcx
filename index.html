<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>InkwellCX - High-Converting Websites & Web Design Services</title>
    <meta name="description" content="South Africa-based website design, SEO, hosting, and website management for small businesses that need faster, higher-converting websites." />
    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1" />
    <link rel="canonical" href="https://inkwellcx.com/" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="InkwellCX" />
    <meta property="og:title" content="InkwellCX - High-Converting Websites & Web Design Services" />
    <meta property="og:description" content="South Africa-based website design, SEO, hosting, and website management for small businesses that need faster, higher-converting websites." />
    <meta property="og:url" content="https://inkwellcx.com/" />
    <meta property="og:image" content="https://inkwellcx.com/opengraph-image" />
    <meta property="og:image:alt" content="InkwellCX - Websites that convert" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="InkwellCX - High-Converting Websites & Web Design Services" />
    <meta name="twitter:description" content="South Africa-based website design, SEO, hosting, and website management for small businesses that need faster, higher-converting websites." />
    <meta name="twitter:image" content="https://inkwellcx.com/opengraph-image" />
    <link rel="me" href="https://www.instagram.com/inkwell_cx/" />
    <link rel="icon" type="image/webp" href="/favicon.webp" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;600;700;800&display=block"/>
    <link rel="preload" as="image" href="/logo-dark.svg" fetchpriority="high" />
    <link rel="preload" as="image" href="/logo-light.svg" fetchpriority="high" />
    <style>
      /* Critical above-the-fold CSS */
      *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
      :root{--bg:#0D1117;--surface:#111820;--border:#21262D;--text:#E6EDF3;--muted:#A2AAB3;--accent:#58A6FF;--navbar-bg:rgba(13,17,23,0.92);--radius:6px;--green:#56D364;--font-mono:'Space Mono','SpaceMono-fallback',monospace;--font-sans:'Syne','Syne-fallback',sans-serif}
      [data-theme="light"]{--bg:#F6F8FA;--surface:#FFFFFF;--border:#D0D7DE;--text:#1F2328;--muted:#656D76;--accent:#0969DA;--green:#1A7F37;--navbar-bg:rgba(246,248,250,0.92)}
      html{scroll-behavior:smooth}
      body{font-family:var(--font-sans);background:var(--bg);color:var(--text);line-height:1.6;overflow-x:hidden;-webkit-font-smoothing:antialiased}
      .page-wrapper{max-width:1280px;margin:0 auto;border-left:.5px solid var(--border);border-right:.5px solid var(--border);min-height:100vh;position:relative;z-index:1;overflow-x:hidden}
      .navbar{position:sticky;top:0;z-index:1000;background:var(--navbar-bg);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--border)}
      .navbar-inner{display:flex;align-items:center;justify-content:space-between;height:64px}
      .container{max-width:1160px;margin:0 auto;padding:0 32px}
      .hero-headline{font-size:48px;line-height:1.2;font-weight:700;color:var(--text)}
      .body-copy{font-size:16px;color:var(--text);line-height:1.6}
      .status-badge{display:inline-flex;align-items:center;gap:8px;padding:8px 12px;background:rgba(63,185,80,0.1);border:1px solid var(--green);border-radius:4px;font-size:12px;color:var(--green)}
      .pulse-dot{width:8px;height:8px;background:var(--green);border-radius:50%;animation:pulse 2s infinite}
      @keyframes pulse{0%{opacity:1}50%{opacity:.5}100%{opacity:1}}
    </style>
    <style>
      @font-face {
        font-family: 'Syne-fallback';
        src: local('Arial');
        size-adjust: 96%;
        ascent-override: 91%;
        descent-override: 22%;
        line-gap-override: 0%;
      }
      @font-face {
        font-family: 'SpaceMono-fallback';
        src: local('Courier New');
        size-adjust: 108%;
        ascent-override: 86%;
        descent-override: 22%;
        line-gap-override: 0%;
      }
    </style>
  </head>
  <body>
    <script>
      (function(){
        try {
          var t = localStorage.getItem('theme');
          if (t === 'light') {
            document.documentElement.setAttribute('data-theme', 'light');
          } else {
            document.documentElement.removeAttribute('data-theme');
          }
        } catch(e){}
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
